services:
  nginx:
    build: nginx/
    ports:
      - "443:443"
  mariadb:
    build: mariadb/
    ports:
      - "3306:3306" 
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - .env
    secrets:
      - db_password
volumes:
  db_data:
secrets:
  db_password:
    file: ./.secrets/db_password.txt

